spring.application.name=skillhire-backend
server.port=${SERVER_PORT:8080}

# ---- MySQL connection ----
# Reads from environment variables so you never hardcode credentials.
# On Windows (PowerShell), set these once per session, e.g.:
#   $env:DB_USERNAME="root"
#   $env:DB_PASSWORD="yourpassword"
# Or create a .env-style application-local.properties (see application-example.properties)
# and run with --spring.profiles.active=local
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:skillhire_db}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
# update = auto-create/alter tables from entities. Good for dev. Switch to "validate"
# once your schema stabilizes, and use a migration tool (Flyway/Liquibase) for production.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---- CORS (frontend origins) ----
# Comma-separated list of allowed origins for your React dev server.
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
