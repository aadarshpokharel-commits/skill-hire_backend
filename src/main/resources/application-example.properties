# Copy this file to application-local.properties (which is gitignored) and fill in
# your real MySQL credentials. Then run the app with:
#   mvn spring-boot:run -Dspring-boot.run.profiles=local
#
# This keeps secrets out of version control instead of relying only on env vars.

DB_HOST=localhost
DB_PORT=3306
DB_NAME=skillhire_db
